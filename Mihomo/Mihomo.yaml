rules:
  # Mihomo has no block_quic switch; reject UDP/443 to force TCP fallback.
  - AND,((NETWORK,UDP),(DST-PORT,443)),REJECT
  - DOMAIN-SUFFIX,maaafty.com,DIRECT
  - DOMAIN,cloudflare-dns.com,Proxy
  - DOMAIN,dns.google,Proxy
  - RULE-SET,Manual_REJECT,REJECT
  - RULE-SET,Reject,REJECT
  - RULE-SET,Manual_DIRECT,DIRECT
  - RULE-SET,Bilibili_Global,Streaming
  - RULE-SET,Bilibili_CN,DIRECT
  - RULE-SET,Game_CN,DIRECT
  - RULE-SET,Apple_CN,DIRECT
  - RULE-SET,Microsoft_CN,DIRECT
  - RULE-SET,Google_CN,DIRECT
  - RULE-SET,AI,AI
  - RULE-SET,Streaming,Streaming
  - RULE-SET,Game_Global,Game
  - RULE-SET,Telegram,Telegram,no-resolve
  - RULE-SET,Social,Social
  - RULE-SET,Apple_Global,Apple
  - RULE-SET,Microsoft_Global,Microsoft
  - RULE-SET,Google_Global,Google
  - RULE-SET,Manual_PROXY,Proxy
  - RULE-SET,ChinaDomain,DIRECT
  - RULE-SET,ChinaIP,DIRECT,no-resolve
  - IP-CIDR,127.0.0.0/8,DIRECT,no-resolve
  - IP-CIDR,192.168.0.0/16,DIRECT,no-resolve
  - IP-CIDR,10.0.0.0/8,DIRECT,no-resolve
  - IP-CIDR,172.16.0.0/12,DIRECT,no-resolve
  - IP-CIDR,100.64.0.0/10,DIRECT,no-resolve
  - DOMAIN,localhost,DIRECT
  - DOMAIN-SUFFIX,local,DIRECT
  - DOMAIN,passenger.t3go.cn,DIRECT
  - MATCH,Final
