# Generated for Maaafty/egern-rule-builder.
# Replace the Subscription URL before starting Mihomo.
# Egern/Surge sgmodule entries have no Mihomo equivalent and are intentionally omitted.

port: 6152
socks-port: 6153
allow-lan: false
mode: rule
log-level: info
ipv6: false

profile:
  store-selected: true
  store-fake-ip: true

tun:
  enable: true
  stack: mixed
  auto-route: true
  auto-detect-interface: true
  strict-route: true
  dns-hijack:
    - any:53
    - tcp://any:53
  route-exclude-address:
    - 10.33.0.0/16
    - 10.66.0.0/16
    - 100.64.0.0/10
    - 127.0.0.0/8
    - 169.254.0.0/16
    - 172.16.0.0/12
    - 192.0.0.0/24
    - 192.0.2.0/24
    - 192.168.0.0/16
    - 198.51.100.0/24
    - 203.0.113.0/24
    - 224.0.0.0/4
    - 255.255.255.255/32
    - 8.137.110.69/32

geodata-mode: false
geo-auto-update: true
geo-update-interval: 24
geox-url:
  mmdb: https://raw.githubusercontent.com/Loyalsoldier/geoip/release/Country-without-asn.mmdb

hosts:
  "*.maaafty.com": 69.63.210.33
  maaafty.com: 69.63.210.33
  dns.google:
    - 8.8.8.8
    - 8.8.4.4
  cloudflare-dns.com:
    - 104.16.249.249
    - 104.16.248.249
  dns.alidns.com:
    - 223.5.5.5
    - 223.6.6.6
  doh.pub:
    - 1.12.12.12
    - 120.53.53.53

dns:
  enable: true
  listen: 127.0.0.1:1053
  ipv6: false
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  fake-ip-filter-mode: blacklist
  fake-ip-filter:
    - "*.maaafty.com"
    - lancache.steamcontent.com
    - "*.msftconnecttest.com"
    - "*.msftncsi.com"
    - "*.srv.nintendo.net"
    - "*.stun.playstation.net"
    - xbox.*.microsoft.com
    - "*.xboxlive.com"
    - "*.logon.battlenet.com.cn"
    - "*.logon.battle.net"
    - stun.l.google.com
    - "*.prod.cloud.netflix.com"
    - appboot.netflix.com
    - "*-appboot.netflix.com"
  use-hosts: true
  use-system-hosts: true
  respect-rules: true
  default-nameserver:
    - 223.5.5.5
    - 119.29.29.29
  proxy-server-nameserver:
    - https://dns.alidns.com/dns-query
    - https://doh.pub/dns-query
  direct-nameserver:
    - https://dns.alidns.com/dns-query
    - https://doh.pub/dns-query
  direct-nameserver-follow-policy: true
  nameserver:
    - "https://cloudflare-dns.com/dns-query#Proxy"
    - "https://dns.google/dns-query#Proxy"
  nameserver-policy:
    "rule-set:Reject": rcode://success
    "rule-set:Manual_DNS_Domestic":
      - https://dns.alidns.com/dns-query
      - https://doh.pub/dns-query
    "rule-set:Manual_DNS_Foreign":
      - "https://cloudflare-dns.com/dns-query#Proxy"
      - "https://dns.google/dns-query#Proxy"
    "rule-set:ChinaDomain":
      - https://dns.alidns.com/dns-query
      - https://doh.pub/dns-query

proxy-providers:
  Subscription:
    type: http
    url: https://example.com/replace-with-your-subscription
    path: ./proxy_providers/Subscription.yaml
    interval: 86400
    health-check:
      enable: true
      url: https://www.gstatic.com/generate_204
      interval: 300
      timeout: 5000
      lazy: true
      expected-status: 204

proxy-groups:
  - name: Proxy
    type: select
    use:
      - Subscription
  - name: Streaming
    type: select
    proxies:
      - Proxy
  - name: AI
    type: select
    proxies:
      - Proxy
  - name: Game
    type: select
    proxies:
      - Proxy
      - DIRECT
  - name: Telegram
    type: select
    proxies:
      - Proxy
  - name: Social
    type: select
    proxies:
      - Proxy
  - name: Apple
    type: select
    proxies:
      - Proxy
      - DIRECT
  - name: Microsoft
    type: select
    proxies:
      - Proxy
      - DIRECT
  - name: Google
    type: select
    proxies:
      - Proxy
      - DIRECT
  - name: Final
    type: select
    proxies:
      - Proxy
      - DIRECT

