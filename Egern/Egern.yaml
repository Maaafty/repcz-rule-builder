    policies: [Proxy, DIRECT]
    flatten: true
    icon: https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Final.png

rules:
- or:
    name: Foreign DNS
    match:
    - domain:
        match: cloudflare-dns.com
    - domain:
        match: dns.google
    policy: Proxy
    disabled: false
- rule_set:
    match: https://raw.githubusercontent.com/Maaafty/egern-rule-builder/main/generated/Egern/Rules/Reject.yaml
    policy: REJECT
- rule_set:
    match: https://raw.githubusercontent.com/Maaafty/egern-rule-builder/main/generated/Egern/Rules/Bilibili_Global.yaml
